name: Issue Triage Agent

on:
  issues:
    types: [opened, edited]

jobs:
  triage:
    # Skip if already labelled by the agent (prevents re-triage loops)
    if: |
      !contains(github.event.issue.labels.*.name, 'agent-ready') &&
      !contains(github.event.issue.labels.*.name, 'agent:in-progress') &&
      !contains(github.event.issue.labels.*.name, 'agent:pr-opened') &&
      !contains(github.event.issue.labels.*.name, 'agent:skip')

    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Triage issue with Claude
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          script: |
            const fs = require('fs');

            // Read CLAUDE.md
            const claudeMd = fs.readFileSync('CLAUDE.md', 'utf8');

            // Get issue details
            const issue = context.payload.issue;
            const issueBody = `Title: ${issue.title}\n\nBody:\n${issue.body || '(no description provided)'}`;

            // Call Anthropic API
            const response = await fetch('https://api.anthropic.com/v1/messages', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'x-api-key': process.env.ANTHROPIC_API_KEY,
                'anthropic-version': '2023-06-01'
              },
              body: JSON.stringify({
                model: 'claude-sonnet-4-20250514',
                max_tokens: 4096,
                messages: [{
                  role: 'user',
                  content: `You are a triage agent for the Doser GitHub repository.

Here is the project documentation (CLAUDE.md):

${claudeMd}

---

Here is the issue to evaluate (#${issue.number}):

${issueBody}

---

Your job is to evaluate this issue and determine whether it is well-defined enough for an autonomous coding agent to work on.

**For bug reports, ALL of the following must be present:**
- Clear description of what is broken
- Steps to reproduce (or a specific user action that triggers it)
- Expected behaviour vs actual behaviour
- Reference to a specific area of the app (route, component, API endpoint, or feature)

**For feature requests, ALL of the following must be present:**
- A user story or clear description of the desired behaviour
- Acceptance criteria (what "done" looks like)
- Reference to where in the app this belongs

**For chores/refactors, ALL of the following must be present:**
- Specific files, modules, or patterns to be changed
- The reason or goal
- Clear definition of done

---

Respond with a JSON object (and ONLY the JSON object, no markdown formatting) with this exact structure:
{
  "decision": "agent-ready" | "needs-clarification" | "too-vague",
  "comment": "The markdown comment to post on the issue"
}

For "agent-ready": Keep the comment brief and encouraging.
For "needs-clarification": List what's missing as bullets and ask specific questions.
For "too-vague": Include a suggested rewrite in a <details> block with summary "📝 Suggested rewrite — click to expand"`
                }]
              })
            });

            if (!response.ok) {
              const error = await response.text();
              throw new Error(`Anthropic API error: ${error}`);
            }

            const data = await response.json();
            const responseText = data.content[0].text;

            // Parse the JSON response
            let result;
            try {
              // Try to extract JSON from the response
              const jsonMatch = responseText.match(/\{[\s\S]*\}/);
              if (jsonMatch) {
                result = JSON.parse(jsonMatch[0]);
              } else {
                throw new Error('No JSON found in response');
              }
            } catch (e) {
              console.log('Failed to parse response:', responseText);
              throw new Error(`Could not parse Claude response: ${e.message}`);
            }

            // Apply the label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: [result.decision]
            });

            // Post the comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: result.comment
            });

            console.log(`Applied label: ${result.decision}`);
